spring:
  application:
    name: fridge
  profiles:
    active: local
  web:
    resources:
      add-mappings: false

  # 공통 JPA 기본값
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.default_batch_fetch_size: 100

  # 공통 애플리케이션 설정
  cache:
    type: caffeine

  task:
    scheduling:
      pool:
        size: 5

  jackson:
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 공통 서버 설정
server:
  tomcat:
    max-connections: 20000
    threads:
      max: 600
      min-spare: 100

management:
  endpoint:
    shutdown:
      access: none
  endpoints:
    web:
      exposure:
        include: "*"

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}
  channel: "#project"
  username: "fridgely-alert"

# 프로파일별 설정
---
spring.config.activate.on-profile: local
spring.config.import: application-local.yml

---
spring.config.activate.on-profile: test
spring.config.import: application-test.yml

---
spring.config.activate.on-profile: performance
spring.config.import: application-performance.yml

---
spring.config.activate.on-profile: live
spring.config.import: application-live.yml
