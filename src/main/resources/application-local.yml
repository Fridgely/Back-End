# 로컬 개발 환경 (H2 인메모리 DB)
spring:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
      show_sql: true

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:core;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      pool-name: core-db-pool
      data-source-properties:
        rewriteBatchedStatements: true

  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiration-time: 30m
    refresh-token-expiration-time: 7d