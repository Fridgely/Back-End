map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream spring_app {
    server spring-app:8080;
    keepalive 32;
}

# 요청 속도 제한
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name fridgely.cloud www.fridgely.cloud;

    # Certbot 인증 (자동 갱신용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 강제 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fridgely.cloud www.fridgely.cloud;

    # SSL 인증서 경로
    ssl_certificate     /etc/letsencrypt/live/fridgely.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fridgely.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 기본 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # /actuator로 시작하는 모든 경로 차단 (정규식 사용)
    location ~ ^/actuator {
        deny all;
    }

    # Swagger - Basic Auth 인증 필요
    location ~* ^/(swagger-ui|v3/api-docs)(/|$) {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://spring_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /grafana 끝 슬래시 없이 접속 시 리다이렉트
    location = /grafana {
        return 301 https://$host/grafana/;
    }

    # Grafana 프록시
    location /grafana/ {
        proxy_pass http://grafana:3000/grafana/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;


        # Grafana Live 웹소켓 지원
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # API 요청 프록시
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://spring_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_set_header X-Request-ID      $request_id;

        # 타임아웃
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 응답 버퍼
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }
}