upstream spring_app {
    server spring-app:8080;
    keepalive 32;
}

# 요청 속도 제한
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # 기본 보안 헤더
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # /actuator 외부 직접 접근 차단
    # - 외부 → Nginx → Spring Boot 경로의 /actuator/** 를 모두 차단
    # - Prometheus는 Docker 내부 네트워크(spring-app:8080)로 직접 스크랩해 이 블록의 영향을 받지 않음
    # - Spring Security에서는 /actuator/health, /actuator/info, /actuator/prometheus만 permitAll()로 허용하고 나머지 /actuator/**는 denyAll() 처리
    location /actuator {
        deny all;
        return 403;
    }

    # API 요청 프록시
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://spring_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # 타임아웃
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 응답 버퍼
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }
}