map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream spring_app {
    server spring-app:8080;
    keepalive 32;
}

# мҡ”мІӯ мҶҚлҸ„ м ңн•ң
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name fridgely.cloud www.fridgely.cloud;

    # Certbot мқёмҰқ (мһҗлҸҷ к°ұмӢ мҡ©)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # лӘЁл“  HTTP мҡ”мІӯмқ„ HTTPSлЎң к°•м ң лҰ¬лӢӨмқҙл үнҠё
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fridgely.cloud www.fridgely.cloud;

    # SSL мқёмҰқм„ң кІҪлЎң
    ssl_certificate     /etc/letsencrypt/live/fridgely.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fridgely.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # кё°ліё ліҙм•Ҳ н—ӨлҚ”
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # /actuatorлЎң мӢңмһ‘н•ҳлҠ” лӘЁл“  кІҪлЎң м°ЁлӢЁ (м •к·ңмӢқ мӮ¬мҡ©)
    location ~ ^/actuator {
        deny all;
    }

    # /grafana лҒқ мҠ¬лһҳмӢң м—Ҷмқҙ м ‘мҶҚ мӢң лҰ¬лӢӨмқҙл үнҠё
    location = /grafana {
        return 301 https://$host/grafana/;
    }

    # Grafana н”„лЎқмӢң
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # Grafana лӮҙл¶Җ лҰ¬лӢӨмқҙл үнҠё кІҪлЎң ліҙм •
        proxy_redirect http://grafana:3000/ https://$host/grafana/;

        # Grafana Live мӣ№мҶҢмј“ м§Җмӣҗ
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # API мҡ”мІӯ н”„лЎқмӢң
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://spring_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_set_header X-Request-ID      $request_id;

        # нғҖмһ„м•„мӣғ
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # мқ‘лӢө лІ„нҚј
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }
}