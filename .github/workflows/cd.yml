---
name: Fridgely CD Pipeline

'on':
  workflow_run:
    workflows: ["Fridgely CI Pipeline"]
    branches: ["master"]
    types: [completed]

jobs:
  deploy:
    name: Deploy to OCI Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        # appleboy/ssh-action v1.0.3
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}/fridgely-project

            git fetch origin master

            # exit code 기반 변경 감지 (0=변경없음, 1=변경있음, >1=git 오류)
            git diff --quiet HEAD origin/master -- nginx/nginx.conf; NGINX_CHANGED=$?
            if [ "$NGINX_CHANGED" -gt 1 ]; then
              echo "오류: nginx.conf 변경 감지 중 git diff 실패 (exit code: $NGINX_CHANGED)"
              exit 1
            fi

            git reset --hard origin/master
            git clean -fd -e .env -e .env.local

            ./gradlew clean bootJar -x test

            cp build/libs/fridgely.jar fridgely.jar

            docker compose up -d --no-build --force-recreate app

            # app이 healthy 상태가 될 때까지 최대 60초 대기
            echo "app 헬스체크 대기 중..."
            HEALTHY=false
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' spring-app 2>/dev/null || echo "none")
              if [ "$STATUS" = "healthy" ]; then
                echo "app healthy 확인"
                HEALTHY=true
                break
              fi
              echo "대기 중... ($i/12)"
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "오류: app이 healthy 상태가 되지 않았습니다. 배포를 중단합니다."
              exit 1
            fi

            if [ "$NGINX_CHANGED" -eq 1 ]; then
              echo "nginx 설정 변경 감지 → nginx 컨테이너 재생성"
              docker compose up -d --force-recreate nginx
            else
              echo "nginx 설정 변경 없음 → reload만 수행"
              docker exec nginx nginx -s reload
            fi