version: '3.8'

services:
  # MySQL 8.0
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    command:
      - --max_connections=150
      - --innodb_buffer_pool_size=2G
      - --innodb_log_file_size=256M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: fridge_core
    expose:
      - "3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Spring Boot Application
  app:
    image: eclipse-temurin:17-jre-jammy
    container_name: spring-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./fridgely.jar:/app/fridgely.jar
      - ./logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=live
      - JAVA_TOOL_OPTIONS=-Xms2g -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/logs/heapdump.hprof -Djava.security.egd=file:/dev/./urandom -Duser.timezone=Asia/Seoul
      - TZ=Asia/Seoul

      # DB
      - DB_HOST=db
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}

      # 알림
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - FCM_BASE64_KEY=${FCM_BASE64_KEY}

      # AWS S3
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: ["java", "-jar", "fridgely.jar"]

  # Nginx Reverse Proxy
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt # 인증서 저장 경로
      - ./certbot/www:/var/www/certbot # 인증용 파일 경로
    depends_on:
      app:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: always
    depends_on:
      - nginx
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 갱신 성공 후 nginx reload는 호스트 cron으로 처리
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

  # Prometheus
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - app

  # Grafana
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: always
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_DOMAIN=fridgely.cloud
      - GF_SERVER_ROOT_URL=https://fridgely.cloud/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

volumes:
  prometheus_data:
  grafana_data: