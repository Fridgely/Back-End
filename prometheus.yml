global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fridgely-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['spring-app:8080']
        labels:
          environment: 'live'
          application: 'fridgely'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fridgely-api'